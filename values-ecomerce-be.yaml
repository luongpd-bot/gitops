replicaCount: 1

image:
  repository: ttl.sh/be
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8080
  targetPort: 8080
  nodePort: 30148

containerPort: 8080

resources:
  limits:
    cpu: "1"
    memory: "1024Mi"
  requests:
    cpu: "250m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

tolerations: []

affinity: {}
