replicaCount: 1

image:
  repository: alpine
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 8080
  nodePort: 30148
resources:
  limits:
    cpu: "1"
    memory: "1024Mi"
  requests:
    cpu: "250m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

env:
  - name: ENVIRONMENT
    value: "production"

  - name: LOG_LEVEL
    value: "info"


tolerations: []

affinity: {}
